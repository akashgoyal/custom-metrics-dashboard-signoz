version: '3.8'

services:
  llm-server:
    build: .  # <--- Tells compose to look for your Dockerfile
    container_name: llm_server_app
    ports:
      - "8000:8000"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317
      - OTEL_RESOURCE_ATTRIBUTES=service.name=llm-server-service
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"